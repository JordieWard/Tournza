<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tournza — Sign in</title>

<!--
  ============================================================
  TOURNZA — login.html
  Standalone auth page for GitHub Pages (vanilla HTML/CSS/JS).

  SETUP (2 steps):

  1) Replace the two placeholders in the <script> at the bottom:
        SUPABASE_url_HERE
        SUPABASE_PUBLISHABLE_KEY_HERE

  2) Run this SQL once in your Supabase project (SQL Editor) so the
     "profiles" table and its row-level-security policies exist:

        create table if not exists public.profiles (
          id               uuid primary key references auth.users(id) on delete cascade,
          full_name        text,
          membership_status text default 'Free',
          created_at       timestamptz default now()
        );

        alter table public.profiles enable row level security;

        create policy "read own profile"
          on public.profiles for select
          using (auth.uid() = id);

        create policy "insert own profile"
          on public.profiles for insert
          with check (auth.uid() = id);

        create policy "update own profile"
          on public.profiles for update
          using (auth.uid() = id);

  Note: if "Confirm email" is ON in Supabase (Auth > Providers > Email),
  new users must click the email link before they can log in. This page
  handles both cases.
  ============================================================
-->

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
  /* ---- Tournza palette (swap these for your exact brand hexes) ---- */
  :root{
    --oche:#07101f;        /* page background           */
    --surface:#0b1830;     /* card surface / panels     */
    --raised:#102341;      /* inputs / raised panels    */
    --line:#1c3257;        /* borders                   */
    --chalk:#edf2ff;       /* primary text              */
    --smoke:#95a8cf;       /* muted text                */
    --primary:#2e77ff;     /* brand blue — primary      */
    --primary-2:#0b5fff;   /* gradient start            */
    --primary-hi:#4b8bff;  /* hover                     */
    --green:#1fb574;       /* success                   */
    --danger:#ff5d6c;
    --radius:14px;
    --shadow:0 24px 60px -20px rgba(0,0,0,.7);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  body{
    min-height:100dvh;
    font-family:"Inter",system-ui,-apple-system,sans-serif;
    color:var(--chalk);
    background:
      radial-gradient(900px 600px at 85% -10%, rgba(46,119,255,.16), transparent 60%),
      radial-gradient(700px 500px at -10% 110%, rgba(11,95,255,.10), transparent 60%),
      var(--oche);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
    position:relative;
    overflow-x:hidden;
  }

  /* Signature: a faint dartboard ring drifting behind the card */
  .board-glow{
    position:fixed;
    width:520px;height:520px;
    top:-180px;right:-160px;
    border-radius:50%;
    background:conic-gradient(
      from 0deg,
      var(--primary) 0 10%, #0a1a33 10% 20%,
      var(--primary-hi) 20% 30%, #0a1a33 30% 40%,
      var(--primary) 40% 50%, #0a1a33 50% 60%,
      var(--primary-hi) 60% 70%, #0a1a33 70% 80%,
      var(--primary) 80% 90%, #0a1a33 90% 100%
    );
    opacity:.10;
    filter:blur(2px);
    pointer-events:none;
    -webkit-mask:radial-gradient(circle, transparent 38%, #000 39%, #000 70%, transparent 72%);
            mask:radial-gradient(circle, transparent 38%, #000 39%, #000 70%, transparent 72%);
    animation:spin 90s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  .card{
    width:100%;
    max-width:420px;
    background:linear-gradient(180deg, var(--surface), #12161c);
    border:1px solid var(--line);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:34px 30px 28px;
    position:relative;
    z-index:1;
  }

  /* ---- Brand ---- */
  .brand{display:flex;justify-content:center;margin:2px 0 6px}
  .brand img{width:210px;max-width:72%;height:auto;display:block}
  .tagline{color:var(--smoke);font-size:13px;margin:10px 0 24px}

  /* ---- Tabs ---- */
  .tabs{
    display:grid;grid-template-columns:1fr 1fr;gap:4px;
    background:var(--raised);border:1px solid var(--line);
    border-radius:10px;padding:4px;margin-bottom:22px;
  }
  .tab{
    appearance:none;border:0;cursor:pointer;
    font-family:inherit;font-size:13.5px;font-weight:600;
    color:var(--smoke);background:transparent;
    padding:9px 0;border-radius:7px;transition:.18s;
  }
  .tab.active{background:linear-gradient(135deg,var(--primary-2),var(--primary));color:#fff;box-shadow:0 6px 16px -8px var(--primary)}

  /* ---- Forms ---- */
  form{display:none;flex-direction:column;gap:14px}
  form.active{display:flex}
  .field label{
    display:block;font-size:12px;font-weight:600;
    color:var(--smoke);margin-bottom:6px;letter-spacing:.02em;
  }
  .field input{
    width:100%;font-family:inherit;font-size:14.5px;color:var(--chalk);
    background:var(--raised);border:1px solid var(--line);
    border-radius:10px;padding:12px 13px;transition:border-color .15s, box-shadow .15s;
  }
  .field input::placeholder{color:#5d6675}
  .field input:focus{
    outline:none;border-color:var(--primary);
    box-shadow:0 0 0 3px rgba(46,119,255,.22);
  }

  .btn{
    appearance:none;border:0;cursor:pointer;font-family:inherit;
    font-size:14.5px;font-weight:600;color:#fff;
    background:linear-gradient(135deg,var(--primary-2),var(--primary));
    border-radius:10px;padding:13px;margin-top:4px;
    transition:filter .15s, transform .05s;
  }
  .btn:hover{filter:brightness(1.1)}
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.6;cursor:not-allowed}

  .btn.ghost{
    background:transparent;border:1px solid var(--line);color:var(--chalk);
  }
  .btn.ghost:hover{background:var(--raised);border-color:#284673}

  /* ---- Messages ---- */
  .msg{
    display:none;font-size:13px;line-height:1.45;
    padding:11px 13px;border-radius:10px;margin-bottom:4px;
  }
  .msg.show{display:block}
  .msg.error{background:rgba(255,93,108,.10);border:1px solid rgba(255,93,108,.35);color:#ffb8bf}
  .msg.ok{background:rgba(31,181,116,.10);border:1px solid rgba(31,181,116,.35);color:#7ce4b8}

  /* ---- Dashboard (logged in) ---- */
  #dashboard{display:none;flex-direction:column;align-items:center;text-align:center}
  #dashboard.active{display:flex}
  .avatar{
    width:62px;height:62px;border-radius:50%;
    display:grid;place-items:center;
    font-family:"Oswald",sans-serif;font-weight:700;font-size:24px;color:#fff;
    background:linear-gradient(135deg, var(--primary), var(--primary-2));
    margin:6px 0 18px;border:1px solid rgba(255,255,255,.08);
  }
  .welcome{font-family:"Oswald",sans-serif;font-weight:600;font-size:26px;line-height:1.1}
  .email{color:var(--smoke);font-size:13px;margin-top:6px;word-break:break-all}
  .membership{
    margin:22px 0 24px;width:100%;
    background:var(--raised);border:1px solid var(--line);
    border-radius:12px;padding:16px;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .membership .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--smoke)}
  .badge{
    font-family:"Oswald",sans-serif;font-weight:600;letter-spacing:.04em;
    font-size:14px;padding:6px 13px;border-radius:999px;
    color:#9cc0ff;background:rgba(46,119,255,.14);
    border:1px solid rgba(46,119,255,.45);text-transform:uppercase;
  }
  #dashboard .btn{width:100%}

  .foot{margin-top:20px;text-align:center;font-size:12px;color:#5d6675}

  /* boot / config notice */
  #boot{display:none}
  #boot.active{display:block}

  @media (prefers-reduced-motion:reduce){
    .board-glow{animation:none}
  }
</style>
</head>

    <section id="auth">
      <p class="tagline">Your darts tournament platform. Throw first.</p>

      <div class="tabs" role="tablist">
        <button class="tab active" id="tabLogin"  role="tab">Log in</button>
        <button class="tab"        id="tabSignup" role="tab">Sign up</button>

      <!-- Login -->
      <form id="loginForm" class="active" novalidate>
        <div class="field">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" autocomplete="email" placeholder="you@example.com" required />
        </div>
        <div class="field">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" autocomplete="current-password" placeholder="••••••••" required />
        </div>
        <button class="btn" type="submit" id="loginBtn">Log in</button>

      <!-- Sign up -->
      <form id="signupForm" novalidate>

        <div class="field">

          <input id="suEmail" type="email" autocomplete="email" placeholder="you@example.com" required />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  (function () {
    "use strict";

    // ====== 1. CONFIG — replace these two values ======
    const SUPABASE_URL = "https://uwojmyggmacoxrdolstb.supabase.co";
    const SUPABASE_KEY = "sb_publishable_HhQl-E4KZFnwuSSA_J_JXQ_cIQbilr-";

    // ---- view + element refs ----
    const $ = (id) => document.getElementById(id);
    const authView = $("auth"), dashView = $("dashboard"), bootView = $("boot");
    const errBox = $("errBox"), okBox = $("okBox");

    const showErr = (m) => { errBox.textContent = m; errBox.classList.add("show"); okBox.classList.remove("show"); };
    const showOk  = (m) => { okBox.textContent  = m; okBox.classList.add("show");  errBox.classList.remove("show"); };
    const clearMsg = () => { errBox.classList.remove("show"); okBox.classList.remove("show"); };

    // ---- guard: config not filled in ----
    if (SUPABASE_URL === "SUPABASE_url_HERE" || SUPABASE_KEY === "SUPABASE_PUBLISHABLE_KEY_HERE") {
      authView.style.display = "none";
      bootView.classList.add("active");
      return;
    }

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ---- tab switching ----
    const tabLogin = $("tabLogin"), tabSignup = $("tabSignup");
    const loginForm = $("loginForm"), signupForm = $("signupForm");
    function selectTab(login) {
      clearMsg();
      tabLogin.classList.toggle("active", login);
      tabSignup.classList.toggle("active", !login);
      loginForm.classList.toggle("active", login);
      signupForm.classList.toggle("active", !login);
    }
    tabLogin.addEventListener("click", () => selectTab(true));
    tabSignup.addEventListener("click", () => selectTab(false));

    function setLoading(btn, on, label) {
      btn.disabled = on;
      if (on) { btn.dataset.label = btn.textContent; btn.textContent = label; }
      else if (btn.dataset.label) { btn.textContent = btn.dataset.label; }
    }

    // ====== profiles helpers ======
    // Read the user's profile; create it on first sight (so full_name lands
    // in the profiles table even if email confirmation delayed the first session).
    async function loadProfile(user) {
      let { data, error } = await sb
        .from("profiles")
        .select("full_name, membership_status")
        .eq("id", user.id)
        .maybeSingle();

      if (error) { console.error(error); return null; }

      if (!data) {
        const fullName = (user.user_metadata && user.user_metadata.full_name) || "";
        const ins = await sb
          .from("profiles")
          .insert({ id: user.id, full_name: fullName, email: user.email })
          .select("full_name, membership_status")
          .maybeSingle();
        if (ins.error) { console.error(ins.error); return null; }
        data = ins.data;
      }
      return data;
    }

    // ====== render the logged-in dashboard ======
    async function renderDashboard(session) {
      const user = session.user;
      const profile = await loadProfile(user);

      const name =
        (profile && profile.full_name) ||
        (user.user_metadata && user.user_metadata.full_name) ||
        user.email.split("@")[0];
      const membership = (profile && profile.membership_status) || "Free";

      $("nameOut").textContent = name;
      $("emailOut").textContent = user.email;
      $("membershipOut").textContent = membership;
      $("avatar").textContent = (name.trim()[0] || "T").toUpperCase();

      authView.style.display = "none";
      dashView.classList.add("active");
    }

    function renderAuth() {
      dashView.classList.remove("active");
      authView.style.display = "";
    }

    // ====== sign up ======
    signupForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMsg();
      const full_name = $("suName").value.trim();
      const email = $("suEmail").value.trim();
      const password = $("suPassword").value;

      if (!full_name || !email || password.length < 6) {
        showErr("Enter your name, email, and a password of at least 6 characters.");
        return;
      }

      const btn = $("signupBtn");
      setLoading(btn, true, "Creating…");
      try {
        const { data, error } = await sb.auth.signUp({
          email, password,
          options: { data: { full_name } } // stored on the auth user as metadata
        });
        if (error) { showErr(error.message); return; }

        if (data.session) {
          // Email confirmation is OFF → we're logged in. onAuthStateChange
          // will render the dashboard; loadProfile() writes the profiles row.
          showOk("Account created. Throwing you in…");
          window.location.href = "https://tournza.co.uk/";
        } else {
          // Email confirmation is ON → must verify before logging in.
          showOk("Account created. Check your email to confirm, then log in.");
          selectTab(true);
        }
      } catch (err) {
        showErr(err.message || "Something went wrong creating your account.");
      } finally {
        setLoading(btn, false);
      }
    });

    // ====== log in ======
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearMsg();
      const email = $("loginEmail").value.trim();
      const password = $("loginPassword").value;

      if (!email || !password) { showErr("Enter your email and password."); return; }

      const btn = $("loginBtn");
      setLoading(btn, true, "Logging in…");
      try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { showErr(error.message); return; }
      window.location.href = "https://tournza.co.uk/";
        // success → onAuthStateChange renders the dashboard
      } catch (err) {
        showErr(err.message || "Couldn’t log you in.");
      } finally {
        setLoading(btn, false);
      }
    });

    // ====== log out ======
    $("logoutBtn").addEventListener("click", async () => {
      const btn = $("logoutBtn");
      setLoading(btn, true, "Logging out…");
      try { await sb.auth.signOut(); }
      finally { setLoading(btn, false); }
    });

    // ====== route on auth state ======
    sb.auth.onAuthStateChange((_event, session) => {
      if (session && session.user) renderDashboard(session);
      else { renderAuth(); clearMsg(); }
    });

    // ====== initial session check (page load / refresh) ======
    (async () => {
      const { data } = await sb.auth.getSession();
      if (data.session) renderDashboard(data.session);
    })();
  })();
  </script>
</body>
</html>
